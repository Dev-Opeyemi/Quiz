<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <style>
      body {
        font-family: "Inter";
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        text-align: center;
        /* margin: 60px auto;
        text-align: center; */
      }

      #welcome-screen,
      #quiz-screen,
      #score-screen {
        display: none;
        border: 1px solid rgba(223, 223, 223, 0.555);
        padding: 2.5em 3.5em;
        border-radius: 1.5em;
      }
      #quiz-screen {
        position: relative;
        max-width: max-content;
        box-shadow: 0px 0px 20px rgba(78, 143, 255, 0.131);
      }
      #score-screen {
        display: none;
        max-width: max-content;
        box-shadow: 0px 0px 20px rgba(78, 143, 255, 0.215);
      }
      #score-screen p {
        line-height: 30px;
      }
      #score-screen p span {
        background-color: rgb(76, 141, 255);
        padding: 1px 5px;
        color: white;
        border-radius: 100%;
      }
      #score-screen h1 span {
        color: rgb(76, 141, 255);
      }
      #question-number {
        display: inline-block;
        padding: 0.3em 1em;
        border-radius: 1em;
        border: 1px solid rgb(198, 198, 198);
        position: absolute;
        top: -30px;
        left: 50%;
        transform: translateX(-50%);
        background-color: rgb(76, 141, 255);
        color: white;
        font-weight: 500;
      }
      #welcome-screen {
        display: block;
        position: relative;
        text-align: center;
        max-width: max-content;
        box-shadow: 0px 0px 20px rgba(78, 143, 255, 0.215);
      }
      button {
        padding: 1em 2.5em;
        background: none;
        border-radius: 2em;
        border: 1px solid rgba(11, 100, 255, 0.319);
        font-weight: 700;
        margin-top: 20px;
        transition: 0.3s;
        cursor: pointer;
      }
      button:hover {
        transform: scale(1.03);
        box-shadow: 0px 0px 10px rgba(78, 143, 255, 0.215);
      }
      #welcome-screen div h1 span {
        color: rgb(76, 141, 255);
      }
      #welcome-screen div p {
        color: gray;
        font-size: 14px;
      }
      .knowledge-ch {
        display: inline-block;
        padding: 0.3em 0.6em;
        border-radius: 1em;
        border: 1px solid rgb(198, 198, 198);
        position: absolute;
        top: -38px;
        left: 50%;
        transform: translateX(-50%);
        background-color: rgb(76, 141, 255);
        color: white;
        font-weight: 500;
      }

      #options-container button {
        margin: 8px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>

    <!-- SCREEN 1: WELCOME -->

    <div id="welcome-screen">
      <h4 class="knowledge-ch">knowledge Challenge</h4>

      <div>
        <h1>Ready to test your <span>mind?</span></h1>
        <p>Test your knowledge with these questions</p>
        <button>Start Quiz</button>
      </div>
    </div>

    <!-- SCREEN 2: QUIZ -->
    <div id="quiz-screen">
      <p id="question-number">Question 1 of 5</p>
      <h2 id="question-text">Question goes here</h2>
      <div id="options-container">
        <!-- option buttons will appear here dynamically -->
      </div>
      <p id="feedback"></p>
    </div>

    <!-- SCREEN 3: SCORE -->
    <div id="score-screen">
      <h1>Quiz <span>Over!</span></h1>
      <p id="final-score">
        You scored <br />
        <span>?</span> of <span>?</span>
      </p>
      <button>Play Again</button>
    </div>

    <script src="quiz.js"></script>
  </body>
</html>
